<!doctype html>
<html>
  <head>
    <title>CareersCraft</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />

    <!-- Background Image + Floating Tech Symbols -->
    <style>
      body {
        margin: 0;
        padding-top: 80px; /* space for fixed navbar */
        height: 100vh; /* lock viewport height */
        background: url("{{ url_for('static', filename='images/bg-tech2.jpg') }}");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        overflow: hidden; /* 🔥 disables scroll */
      }

      /* Floating computer symbols */
      .symbol {
        position: absolute;
        font-size: 150px;
        color: rgba(153, 168, 18, 0.25);
        animation: float 25s linear infinite;
        z-index: 1; /* symbols stay behind */
      }

      @keyframes float {
        from {
          transform: translateY(100vh);
        }
        to {
          transform: translateY(-10vh);
        }
      }

      /* Transparent card style */
      .card {
        background-color: rgba(0, 0, 0, 0.7);
        color: #fff;
        border: none;
        position: relative;
        z-index: 10; /* card always above symbols */
      }
    </style>
  </head>
  <body>
    <!-- Floating Tech Symbols -->
    <div class="symbol" style="left: 10%; animation-delay: 0s">💻</div>
    <div class="symbol" style="left: 30%; animation-delay: 5s">⚙️</div>
    <div class="symbol" style="left: 50%; animation-delay: 10s">🔒</div>
    <div class="symbol" style="left: 70%; animation-delay: 15s">🤖</div>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark fixed-top">
      <div class="container">
        <a
          class="navbar-brand"
          href="/"
          style="font-size: 42px; color: #ffcc00; font-weight: bold"
        >
          CareersCraft
        </a>
        <div>
          <a href="/login" class="btn btn-light">Login</a>
          <a href="/register" class="btn btn-warning">Register</a>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container text-center mt-5">
      <div class="card shadow p-4">
        <h1>Welcome to CareersCraft</h1>
        <p class="lead">AI Powered Recruitment Management System</p>
        <a href="/register" class="btn btn-primary btn-lg">Get Started</a>
      </div>
    </div>
  </body>
</html>
