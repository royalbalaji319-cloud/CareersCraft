<!doctype html>
<html>
  <head>
    <title>Available Jobs - CareersCraft</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />

    <!-- Background Image + Floating Tech Symbols -->
    <style>
      body {
        margin: 0;
        padding-top: 80px; /* space for fixed navbar */
        min-height: 100vh;
        background: url("{{ url_for('static', filename='images/bg-tech2.jpg') }}");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        overflow-y: auto;
        overflow-x: hidden;
      }

      /* Floating computer symbols */
      .symbol {
        position: absolute;
        font-size: 170px;
        color: rgba(255, 255, 255, 0.25);
        animation: float 25s linear infinite;
        z-index: 1;
      }

      @keyframes float {
        from {
          transform: translateY(100vh);
        }
        to {
          transform: translateY(-10vh);
        }
      }

      /* Card transparent background */
      .card {
        background-color: rgba(0, 0, 0, 0.87);
        color: #fff;
        border: none;
        position: relative;
        z-index: 10;
      }

      .card-header {
        background-color: transparent;
        border-bottom: none;
      }

      /* 🔥 Heading Card */
      .header-card {
        background-color: rgba(255, 255, 255, 0.9);
        border: none;
        text-align: center;
        padding: 1rem;
        margin-bottom: 1.5rem;
      }

      .header-card h4 {
        font-size: 1.4rem;
        font-weight: 700;
        color: #0d6efd; /* blue heading */
        text-transform: uppercase;
        letter-spacing: 1px;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <!-- Floating Tech Symbols -->
    <div class="symbol" style="left: 10%; animation-delay: 0s">💻</div>
    <div class="symbol" style="left: 30%; animation-delay: 5s">⚙️</div>
    <div class="symbol" style="left: 50%; animation-delay: 10s">🔒</div>
    <div class="symbol" style="left: 70%; animation-delay: 15s"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark fixed-top">
      <div class="container">
        <a
          class="navbar-brand"
          style="font-size: 40px; color: #ffcc00; font-weight: bold"
        >
          CareersCraft
        </a>
        <a href="/logout" class="btn btn-primary btn-logout">Logout</a>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
      <!-- Heading Card -->
      <div class="card header-card shadow">
        <h4>Latest Jobs</h4>
      </div>

      <!-- Search Form -->
      <form method="GET" action="/jobs" class="mb-4">
        <div class="row">
          <div class="col-md-5">
            <input
              type="text"
              name="search"
              class="form-control"
              placeholder="Python Developer"
            />
          </div>
          <div class="col-md-4">
            <input
              type="text"
              name="location"
              class="form-control"
              placeholder="Hyderabad"
            />
          </div>
          <div class="col-md-3">
            <button class="btn btn-success w-100">Search Jobs</button>
          </div>
        </div>
      </form>

      {% if jobs %} {% for job in jobs %}
      <div class="card shadow mb-4">
        <div class="card-body">
          <h4>{{ job.title }}</h4>
          <h5 class="text-primary">{{ job.company }}</h5>
          <p><b>Location :</b> {{ job.location }}</p>
          <p>{{ job.description }}</p>

          <!-- Apply button redirects to company page -->
          <a
            href="{{ job.redirect_url }}"
            target="_blank"
            class="btn btn-success"
          >
            Apply Now
          </a>
          <a
            href="{{ job.redirect_url }}"
            target="_blank"
            class="btn btn-outline-primary ms-2"
          >
            View Job
          </a>
        </div>
      </div>
      {% endfor %} {% else %}
      <div class="alert alert-warning">No Jobs Found.</div>
      {% endif %}
    </div>
  </body>
</html>
