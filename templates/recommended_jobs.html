<!doctype html>
<html>
  <head>
    <title>AI Recommended Jobs - CareersCraft</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />

    <!-- Background Image + Floating Tech Symbols -->
    <style>
      body {
        margin: 0;
        padding-top: 80px; /* space for fixed navbar */
        min-height: 100vh;
        background: url("{{ url_for('static', filename='images/bg-tech2.jpg') }}");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        overflow-y: auto;
        overflow-x: hidden;
      }

      /* Floating computer symbols */
      .symbol {
        position: absolute;
        font-size: 170px;
        color: rgba(0, 0, 0, 0.28);
        animation: float 25s linear infinite;
        z-index: 1;
      }

      @keyframes float {
        from {
          transform: translateY(100vh);
        }
        to {
          transform: translateY(-10vh);
        }
      }

      /* Card transparent background */
      .card {
        background-color: rgba(0, 0, 0, 0.85);
        color: #fff;
        border: none;
        position: relative;
        z-index: 10;
      }

      /* 🔥 Heading Card */
      .header-card {
        background-color: rgba(255, 255, 255, 0.9);
        border: none;
        text-align: center;
        padding: 1rem;
        margin-bottom: 1.5rem;
      }

      .header-card h4 {
        font-size: 1.4rem;
        font-weight: 700;
        color: #0d6efd; /* blue heading */
        text-transform: uppercase;
        letter-spacing: 1px;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <!-- Floating Tech Symbols -->
    <div class="symbol" style="left: 10%; animation-delay: 0s">💻</div>
    <div class="symbol" style="left: 30%; animation-delay: 5s">⚙️</div>
    <div class="symbol" style="left: 50%; animation-delay: 10s">🔒</div>
    <div class="symbol" style="left: 70%; animation-delay: 15s">🤖</div>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark fixed-top">
      <div class="container">
        <a
          class="navbar-brand"
          style="font-size: 42px; color: #ffcc00; font-weight: bold"
        >
          CareersCraft
        </a>
        <a href="/logout" class="btn btn-danger">Logout</a>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
      <!-- Heading Card -->
      <div class="card header-card shadow">
        <h4>🤖 AI Recommended Jobs</h4>
      </div>

      {% if jobs %} {% for job in jobs %}
      <div class="card shadow mb-4">
        <div class="card-body">
          <h3>{{ job.title }}</h3>
          <h5 class="text-success">{{ job.company }}</h5>

          <p><b>📍 Location :</b> {{ job.location }}</p>
          <p>
            <b>🎯 AI Match :</b>
            <span class="badge bg-success">{{ job.match }}%</span>
          </p>

          <p>{{ job.description }}</p>

          <a
            href="{{ job.redirect_url }}"
            target="_blank"
            class="btn btn-primary"
          >
            Apply Now
          </a>
        </div>
      </div>
      {% endfor %} {% else %}
      <div class="alert alert-warning">No Recommended Jobs Found.</div>
      {% endif %}
    </div>
  </body>
</html>
