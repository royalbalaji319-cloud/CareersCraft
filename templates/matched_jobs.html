<!doctype html>
<html>
  <head>
    <title>Matched Jobs - CareersCraft</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <style>
      body {
        margin: 0;
        padding-top: 80px; /* space for fixed navbar */
        min-height: 100vh;
        background: url("{{ url_for('static', filename='images/bg-tech2.jpg') }}");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        overflow-y: auto;
        overflow-x: hidden;
      }

      .card {
        background-color: rgba(0, 0, 0, 0.8); /* dark semi-transparent */
        border: none;
      }

      .header-card {
        background-color: rgb(255, 255, 255);
        border: none;
        text-align: center;
        padding: 1rem;
        margin-bottom: 1.5rem;
      }

      .header-card h5 {
        font-size: 1.3rem;
        font-weight: 700;
        color: #0d6efd; /* blue heading */
        margin-bottom: 0.5rem;
        text-transform: uppercase;
      }

      .header-card p {
        font-size: 0.95rem;
        color: #dc3545; /* red highlight for skills */
        font-weight: 500;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark fixed-top">
      <div class="container">
        <a
          class="navbar-brand"
          href="/"
          style="font-size: 32px; color: #ffcc00; font-weight: bold"
        >
          CareersCraft
        </a>
        <div>
          <a href="/dashboard" class="btn btn-light btn-sm">Dashboard</a>
          <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
      </div>
    </nav>

    <!-- Heading + Skills Card -->
    <div class="container mt-4">
      <div class="card header-card shadow">
        <h5>Jobs Matching Your Resume</h5>
        <p><b>Skills Found:</b> {{ skills|join(", ") }}</p>
      </div>

      {% if jobs %} {% for job in jobs %}
      <div class="card shadow mb-4">
        <div class="card-body">
          <h6 class="text-info">{{ job.title }}</h6>
          <p class="text-success mb-1"><b>{{ job.company }}</b></p>
          <p><b>📍 Location:</b> {{ job.location }}</p>
          <p>{{ job.description }}</p>

          <a
            href="{{ job.redirect_url }}"
            target="_blank"
            class="btn btn-success btn-sm"
          >
            Apply Now
          </a>
        </div>
      </div>
      {% endfor %} {% else %}
      <div class="alert alert-warning">No Matching Jobs Found.</div>
      {% endif %}
    </div>
  </body>
</html>
