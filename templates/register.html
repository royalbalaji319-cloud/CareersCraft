<!doctype html>
<html>
  <head>
    <title>Register - CareersCraft</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />

    <!-- Background Image + Floating Tech Symbols -->
    <style>
      body {
        margin: 0;
        padding-top: 80px; /* 🔥 space for fixed navbar */
        min-height: 100vh; /* allow page to grow */
        background: url("{{ url_for('static', filename='images/bg-tech2.jpg') }}");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        overflow-y: auto; /* 🔥 scroll enabled */
        overflow-x: hidden;
      }

      /* Floating computer symbols */
      .symbol {
        position: absolute;
        font-size: 150px;
        color: rgba(255, 255, 255, 0.25);
        animation: float 25s linear infinite;
        z-index: 1; /* symbols stay behind */
      }

      @keyframes float {
        from {
          transform: translateY(100vh);
        }
        to {
          transform: translateY(-10vh);
        }
      }

      /* 🔥 Card transparent background */
      .card {
        background-color: rgba(0, 0, 0, 0.7);
        color: #fff;
        border: none;
        position: relative;
        z-index: 10; /* card always above symbols */
      }

      .card-header {
        background-color: transparent;
        border-bottom: none;
      }
    </style>
  </head>

  <body>
    <!-- Floating Tech Symbols -->
    <div class="symbol" style="left: 10%; animation-delay: 0s">💻</div>
    <div class="symbol" style="left: 30%; animation-delay: 5s">⚙️</div>
    <div class="symbol" style="left: 50%; animation-delay: 10s">🔒</div>
    <div class="symbol" style="left: 70%; animation-delay: 15s">🤖</div>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark fixed-top">
      <div class="container">
        <a
          class="navbar-brand"
          href="/"
          style="font-size: 42px; color: #ffcc00; font-weight: bold"
        >
          CareersCraft
        </a>
        <div>
          <a href="/login" class="btn btn-light">Login</a>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow">
            <div class="card-header text-center">
              <h3>Create Account</h3>
            </div>

            <div class="card-body">
              <form method="POST">
                <div class="mb-3">
                  <label>Full Name</label>
                  <input
                    type="text"
                    class="form-control"
                    name="fullname"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label>Email</label>
                  <input
                    type="email"
                    class="form-control"
                    name="email"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label>Password</label>
                  <input
                    type="password"
                    class="form-control"
                    name="password"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label>Phone</label>
                  <input type="text" class="form-control" name="phone" />
                </div>

                <div class="mb-3">
                  <label>Role</label>
                  <select class="form-control" name="role">
                    <option value="candidate">Candidate</option>
                    <option value="hr">HR</option>
                  </select>
                </div>

                <button class="btn btn-primary w-100">Register</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
