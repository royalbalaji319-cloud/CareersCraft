<!doctype html>
<html>
  <head>
    <title>Apply Job</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h3>Apply for {{ job_title }}</h3>
        </div>

        <div class="card-body">
          <form action="/submit_application" method="POST">
            <input type="hidden" name="job_title" value="{{ job_title }}" />
            <input type="hidden" name="company" value="{{ company }}" />
            <input type="hidden" name="location" value="{{ location }}" />
            <input
              type="hidden"
              name="redirect_url"
              value="{{ redirect_url }}"
            />

            <div class="mb-3">
              <label class="form-label">Full Name</label>

              <input
                type="text"
                class="form-control"
                name="full_name"
                value="{{ user[1] }}"
                readonly
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>

              <input
                type="email"
                class="form-control"
                name="email"
                value="{{ user[2] }}"
                readonly
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Phone</label>

              <input
                type="text"
                class="form-control"
                name="phone"
                value="{{ user[4] }}"
                readonly
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Cover Letter</label>

              <textarea
                class="form-control"
                rows="6"
                name="cover_letter"
                placeholder="Write your cover letter here..."
                required
              ></textarea>
            </div>

            <button class="btn btn-success">Submit Application</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
