<!doctype html>
<html>
  <head>
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />

    <!-- Background Image + Floating Tech Symbols -->
    <style>
      body {
        margin: 0;
        padding-top: 80px; /* 🔥 space for fixed navbar */
        min-height: 100vh; /* page grows with content */
        background: url("{{ url_for('static', filename='images/bg-tech2.jpg') }}");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        overflow-y: auto; /* 🔥 allow vertical scroll */
        overflow-x: hidden; /* prevent horizontal scroll */
      }

      /* Floating computer symbols */
      .symbol {
        position: absolute;
        font-size: 170px;
        color: rgba(255, 255, 255, 0.25);
        animation: float 25s linear infinite;
        z-index: 1; /* symbols behind */
      }

      @keyframes float {
        from {
          transform: translateY(100vh);
        }
        to {
          transform: translateY(-10vh);
        }
      }

      /* Card styling */
      .card {
        background-color: rgba(0, 0, 0, 0.7);
        color: #fff;
        border: none;
        position: relative;
        z-index: 10; /* cards above symbols */
      }
    </style>
  </head>

  <body>
    <!-- Floating Tech Symbols -->

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark fixed-top">
      <div class="container">
        <a
          class="navbar-brand"
          style="font-size: 42px; color: #ffcc00; font-weight: bold"
        >
          CareerCraft
        </a>
        <a href="/logout" class="btn btn-primary btn-logout">Logout</a>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5">
      <div class="card shadow">
        <div class="card-body">
          <h2>Welcome {{ session['user_name'] }}</h2>
          <hr />

          <h4>Upload Resume</h4>
          <form
            action="/upload_resume"
            method="POST"
            enctype="multipart/form-data"
          >
            <div class="mb-3">
              <input
                type="file"
                name="resume"
                class="form-control"
                accept=".pdf"
                required
              />
            </div>
            <button class="btn btn-primary">Upload Resume</button>
          </form>

          <br /><br />

          <!-- Candidate Options -->
          <a href="/jobs" class="btn btn-success">View Available Jobs</a>
          <a href="/recommended_jobs" class="btn btn-warning"
            >🤖 AI Recommended Jobs</a
          >
          <a href="/analyze_resume" class="btn btn-danger"
            >Check ATS Analysis</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
