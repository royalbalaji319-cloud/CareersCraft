<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - CareersCraft</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />

    <!-- Background Image + Floating Tech Symbols -->
    <style>
      body {
        margin: 0;
        padding-top: 80px; /* space for fixed navbar */
        height: 100vh; /* lock viewport height */
        background: url("{{ url_for('static', filename='images/bg-tech2.jpg') }}");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        overflow: hidden; /* disables scroll */
      }

      /* Floating computer symbols */
      .symbol {
        position: absolute;
        font-size: 150px;
        color: rgba(255, 255, 255, 0.25);
        animation: float 25s linear infinite;
        z-index: 1;
      }

      @keyframes float {
        from {
          transform: translateY(100vh);
        }
        to {
          transform: translateY(-10vh);
        }
      }

      /* Card static, always above background */
      .card {
        background-color: rgba(0, 0, 0, 0.7);
        color: #fff;
        border: none;
        position: relative;
        z-index: 10;
      }

      .card-header {
        background-color: transparent;
        border-bottom: none;
      }
    </style>
  </head>

  <body>
    <!-- Floating Tech Symbols -->
    <div class="symbol" style="left: 10%; animation-delay: 0s">💻</div>
    <div class="symbol" style="left: 30%; animation-delay: 5s">⚙️</div>
    <div class="symbol" style="left: 50%; animation-delay: 10s">🔒</div>
    <div class="symbol" style="left: 70%; animation-delay: 15s">🤖</div>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark fixed-top">
      <div class="container">
        <a
          class="navbar-brand"
          href="/"
          style="font-size: 42px; color: #ffcc00; font-weight: bold"
        >
          CareersCraft
        </a>
        <div>
          <a href="/register" class="btn btn-warning">Register</a>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card shadow">
            <div class="card-header text-center">
              <h3>Login</h3>
            </div>

            <div class="card-body">
              <!-- Modified Form -->
              <form method="POST" autocomplete="on">
                <div class="mb-3">
                  <label>Email</label>
                  <input
                    type="email"
                    class="form-control"
                    name="email"
                    autocomplete="username"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label>Password</label>
                  <input
                    type="password"
                    class="form-control"
                    name="password"
                    autocomplete="current-password"
                    required
                  />
                </div>

                <!-- Remember Me -->
                <div class="form-check mb-3">
                  <input
                    type="checkbox"
                    class="form-check-input"
                    id="rememberMe"
                    name="remember"
                  />
                  <label class="form-check-label" for="rememberMe">
                    Remember Me
                  </label>
                </div>

                <button class="btn btn-primary w-100">Login</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
