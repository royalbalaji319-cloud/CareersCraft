<!doctype html>
<html>
  <head>
    <title>Upload Resume for ATS - CareersCraft</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />

    <style>
      body {
        margin: 0;
        padding-top: 80px; /* space for fixed navbar */
        min-height: 100vh;
        background: url("{{ url_for('static', filename='images/bg-tech2.jpg') }}");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        overflow-y: auto;
        overflow-x: hidden;
      }

      .card {
        background-color: rgba(0, 0, 0, 0.83); /* dark semi-transparent */
        color: #fff;
        border: none;
      }

      /* Heading Card */
      .header-card {
        background-color: rgba(255, 255, 255, 0.9);
        border: none;
        text-align: center;
        padding: 1rem;
        margin-bottom: 1.5rem;
      }

      .header-card h4 {
        font-size: 1.4rem;
        font-weight: 700;
        color: #dc3545; /* red heading */
        text-transform: uppercase;
        letter-spacing: 1px;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark fixed-top">
      <div class="container">
        <a
          class="navbar-brand"
          href="/"
          style="font-size: 40px; color: #ffcc00; font-weight: bold"
        >
          CareersCraft
        </a>
        <div>
          <a href="/dashboard" class="btn btn-light btn-sm">Dashboard</a>
          <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
      </div>
    </nav>

    <!-- Heading Card -->
    <div class="container mt-4">
      <div class="card header-card shadow">
        <h4>Upload Resume for ATS Analysis</h4>
      </div>

      <!-- Main Content -->
      <div class="card shadow">
        <div class="card-body">
          <form
            action="/analyze_resume"
            method="POST"
            enctype="multipart/form-data"
          >
            <div class="mb-3">
              <input
                type="file"
                name="resume"
                class="form-control"
                accept=".pdf"
                required
              />
            </div>
            <button class="btn btn-danger">Check ATS</button>
            <a href="/dashboard" class="btn btn-secondary">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
